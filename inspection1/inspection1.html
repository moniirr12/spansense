<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="/fetch-credentials.js"></script>
    <script src="/roleBadge.js"></script>
    <script>(function(){var nm=localStorage.getItem('nightMode');var dark=nm==='on'||(nm===null&&!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches));if(dark)document.documentElement.classList.add('nm-preload');})();</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>spanSense — Inspection Details | Modern Layout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="inspection1.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
<script>if(document.documentElement.classList.contains('nm-preload'))document.body.classList.add('night-mode');</script>

    <!-- FLOATING ISLAND NAVBAR -->
    <div class="navbar">
        <div class="left">
            <div class="logo">spanSense</div>
        </div>
        <div class="right">
            <div class="night-mode-toggle" id="nightModeToggle"><i class="fas fa-moon"></i></div>
            <div class="account-links">
                <a href="../accounts/accounts.html" title="Account"><i class="fas fa-user-circle"></i></a>
                <a href="../contacts/contacts.html" title="Contact Us"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </div>

    <!-- MAIN 75% WIDTH LAYOUT WITH SIDEBAR -->
    <div class="inspection-wrapper">
        <div class="inspection-layout">
            <!-- LEFT: MAIN CONTENT -->
            <div class="inspection-main">
                <h2 id="bridgeHeader">Loading...</h2>

                <div class="info-cards">
                    <!-- Date Card -->
                    <div class="info-card">
                        <div class="info-label">INSPECTION DATE</div>
                        <div class="date-value" id="inspectionDate" onclick="date()">Select date</div>
                    </div>
                    
                    <!-- Inspection Type Card -->
                    <div class="info-card">
                        <div class="info-label">INSPECTION TYPE</div>
                        <div class="inspection-type">
                            <button class="inspection-type-btn" data-type="PI">PI</button>
                            <button class="inspection-type-btn" data-type="GI">GI</button>
                            <button class="inspection-type-btn" data-type="SI">SI</button>
                        </div>
                    </div>
                    
                    <!-- Inspector Card - NO extra div wrapper -->
                    <div class="info-card">
                        <div class="info-label">INSPECTOR NAME</div>
                        <input type="text" id="inspectorName" placeholder="Click to edit name">
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                </div>

                <div class="span-tabs" id="span-tabs"></div>
                <div class="span-content-row">
                    <div id="form-content"></div>

                    <div class="bridge-info-tab" id="bridgeInfoTab" role="button" tabindex="0" aria-expanded="false" aria-controls="bridgeInfoPanel">
                        <svg class="info-tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        <span class="info-tab-label">Span Info</span>
                        <svg class="info-tab-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </div>

                    <div class="bridge-info-panel" id="bridgeInfoPanel">
                        <div class="bridge-info-panel-inner" id="bridgeInfoPanelInner"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDEBAR: Bridge Details + Mock Image -->
            <aside class="bridge-sidebar">
                <div class="sidebar-card">
                    <div class="bridge-name" id="sidebarBridgeName">Golden Gate Overpass</div>
                    <div class="bridge-id" id="sidebarBridgeId">Bridge ID: A-104</div>
                    
                    <!-- Mock Image -->
                    <div class="mock-image">
                        <i class="fas fa-bridge"></i>
                        <span>spanSense Â©</span>
                    </div>
                    
                    <div class="sidebar-divider"></div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label"><i class="fas fa-road"></i> Spans</span>
                        <span class="sidebar-stat-value" id="sidebarSpanCount">4</span>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label"><i class="fas fa-ruler-horizontal"></i> Length</span>
                        <span class="sidebar-stat-value" id="sidebarLength">128 m</span>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label"><i class="fas fa-clipboard-check"></i> Built Year</span>
                        <span class="sidebar-built" id="sidebarBuiltYear">--</span>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label"><i class="fas fa-calendar-check"></i> Last Inspection</span>
                        <span class="sidebar-stat-value" id="sidebarLastInsp">14 Mar 2026</span>
                    </div>
                    <div class="sidebar-divider"></div>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn primary" id="saveDraftBtn"><i class="fas fa-save"></i> Save Draft</button>
                    </div>
                </div>
                <div class="navigation">
                    <button id="toIndex">Back</button>
                    <button id="toBCI">Next</button>
                </div>
            </aside>
        </div>
    </div>

    <!-- GLASS SCROLLBAR -->
    <div class="glass-scrollbar" id="glassScrollbar">
        <div class="thumb" id="glassThumb"></div>
    </div>




    <!-- MODAL OVERLAY -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-icon" id="modalIcon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h3 class="modal-title" id="modalTitle">Cannot Proceed</h3>
            <p class="modal-message" id="modalMessage">Message goes here</p>
            <div class="modal-actions" id="modalActions">
                <button class="modal-btn primary" id="modalConfirmBtn">OK</button>
            </div>
        </div>
    </div>


            

    <script src="inspection1.js"></script>
    <script>   
        // ============================================
        // MODAL SYSTEM — MUST be defined BEFORE navigateToNextPage
        // ============================================
        (function() {
            'use strict';
            
            const overlay = document.getElementById('modalOverlay');
            const iconBox = document.getElementById('modalIcon');
            const titleBox = document.getElementById('modalTitle');
            const msgBox = document.getElementById('modalMessage');
            const actionsBox = document.getElementById('modalActions');
            
            let _modalPromiseResolve = null;
            
            window.showModal = function showModal(opts) {
                var title = opts.title || '';
                var message = opts.message || '';
                var type = opts.type || 'error';
                var confirmText = opts.confirmText || 'OK';
                var cancelText = opts.cancelText || 'Cancel';
                var showCancel = opts.showCancel || false;
                
                return new Promise(function(resolve) {
                    _modalPromiseResolve = resolve;
                    
                    iconBox.className = 'modal-icon';
                    if (type === 'warning') iconBox.classList.add('warning');
                    if (type === 'success') iconBox.classList.add('success');
                    
                    var iconMap = {
                        error: 'fa-exclamation-circle',
                        warning: 'fa-exclamation-triangle',
                        success: 'fa-check-circle'
                    };
                    iconBox.innerHTML = '<i class="fas ' + (iconMap[type] || iconMap.error) + '"></i>';
                    
                    titleBox.textContent = title;
                    msgBox.textContent = message;
                    
                    var buttonsHTML = '';
                    if (showCancel) {
                    buttonsHTML += '<button class="modal-btn secondary" id="modalCancelBtn">' + cancelText + '</button>';
                }
                    var btnClass = (type === 'error') ? 'danger' : 'primary';
                    buttonsHTML += '<button class="modal-btn ' + btnClass + '" id="modalConfirmBtn">' + confirmText + '</button>';
                    actionsBox.innerHTML = buttonsHTML;
                    
                    var confirmBtn = document.getElementById('modalConfirmBtn');
                    var cancelBtn = document.getElementById('modalCancelBtn');
                    
                    confirmBtn.onclick = function() {
                        _doClose(true);
                    };
                    
                    if (cancelBtn) {
                        cancelBtn.onclick = function() {
                            _doClose(false);
                        };
                    }
                    
                    overlay.classList.add('active');
                });
            };
            
            function _doClose(result) {
                overlay.classList.remove('active');
                if (_modalPromiseResolve) {
                    _modalPromiseResolve(result);
                    _modalPromiseResolve = null;
                }
            }
            
            window.closeModal = _doClose;
            
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) _doClose(false);
            });
            
            document.addEventListener('keydown', function(e) {
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'Escape') _doClose(false);
                if (e.key === 'Enter') {
                    var btn = document.getElementById('modalConfirmBtn');
                    if (btn) btn.click();
                }
            });
        })();

        // ============================================
        // NAVIGATION
        // ============================================
        async function navigateToNextPage() {
    // Wait for modal to be ready
    if (typeof showModal !== 'function') {
        console.warn('Modal not ready, waiting...');
        await new Promise(resolve => setTimeout(resolve, 100));
        if (typeof showModal !== 'function') {
            alert('Please wait for page to fully load');
            return;
        }
    }
    
    const missingCriticalFields = [];
    if (!inspectionData.inspectionType) missingCriticalFields.push("Inspection Type");
    if (!inspectionData.inspectorName) missingCriticalFields.push("Inspector Name");
    if (!inspectionData.inspectionDate) missingCriticalFields.push("Inspection Date");

    if (missingCriticalFields.length > 0) {
        await showModal({
            title: "Cannot Proceed",
            message: "The following required fields are missing:\n\n" + missingCriticalFields.join("\n"),
            type: "error",
            confirmText: "Got it"
        });
        return;
    }

    const incompleteSpans = inspectionData.spans.filter(function(span, index) {
        return !completed[index] || span.elementsInspected === null || span.photographsTaken === null;
    }).length;

    if (incompleteSpans > 0) {
        var proceed = await showModal({
            title: "Incomplete Spans",
            message: incompleteSpans + " span(s) are incomplete.\n\nProceed anyway?",
            type: "warning",
            confirmText: "Proceed",
            cancelText: "Go Back",
            showCancel: true
        });
        if (!proceed) return;
    }

    sessionStorage.setItem('inspectionData', JSON.stringify(inspectionData));
    window.location.href = "../inspection/inspection.html";
}
    
    </script>
</body>
</html>

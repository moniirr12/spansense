<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpanSense — Navbar Mock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f5f7fb;
            color: #2c3e44;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        /* ---------- NAVIGATION BAR (optimized) ---------- */
        .navbar {
            position: relative;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 58px;
            transition: all 0.3s ease;
        }

        .navbar .left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar .logo {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #5b8c8a 0%, #7ba8a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .navbar .menu {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .navbar .menu a {
            text-decoration: none;
            color: #4a5b6e;
            font-weight: 500;
            font-size: 0.78rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .navbar .menu a i {
            font-size: 0.85rem;
            width: 16px;
            text-align: center;
        }

        .navbar .menu a:hover {
            color: #5b8c8a;
            background: rgba(91, 140, 138, 0.08);
        }

        .navbar .menu a.active {
            background: rgba(91, 140, 138, 0.12);
            color: #5b8c8a;
        }

        /* Special styling for TwinView */
        .navbar .menu a.twinview {
            color: #6b5b8a;
        }

        .navbar .menu a.twinview:hover {
            color: #7b6b9a;
            background: rgba(107, 91, 138, 0.08);
        }

        .navbar .menu a.twinview.active {
            background: rgba(107, 91, 138, 0.12);
            color: #7b6b9a;
        }

        .navbar .menu a.twinview i {
            color: #7b6b9a;
        }

        .navbar .right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .night-mode-toggle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8a9ba8;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .night-mode-toggle:hover {
            background: #f0f4f8;
            color: #5b8c8a;
        }

        .navbar .account-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar .account-links a {
            text-decoration: none;
            color: #6a7c8e;
            font-size: 0.78rem;
            transition: color 0.2s;
            padding: 6px 10px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .navbar .account-links a:hover {
            color: #5b8c8a;
            background: rgba(91, 140, 138, 0.08);
        }

        .navbar .account-links a.active {
            background: rgba(91, 140, 138, 0.12);
            color: #5b8c8a;
        }

        /* Demo content */
        .demo-content {
            margin-top: 60px;
            padding: 40px;
            background: white;
            border-radius: 24px;
            border: 1px solid #e9edf2;
            max-width: 600px;
            text-align: center;
        }

        .demo-content h2 {
            color: #2c5a57;
            margin-bottom: 12px;
        }

        .demo-content p {
            color: #8a9ba8;
            line-height: 1.6;
        }

        /* Night Mode */
        .night-mode {
            background-color: #1a2428 !important;
            color: #d4dfe3;
        }

        .night-mode .navbar {
            background: rgba(35, 46, 52, 0.95) !important;
            border-color: #2f3e45;
        }

        .night-mode .navbar .logo {
            background: linear-gradient(135deg, #8ab4b0 0%, #a0c8c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .night-mode .navbar .menu a {
            color: #9ab0b8;
        }

        .night-mode .navbar .menu a:hover {
            color: #8ab4b0;
            background: rgba(138, 180, 176, 0.15);
        }

        .night-mode .navbar .menu a.active {
            background: rgba(138, 180, 176, 0.2);
            color: #8ab4b0;
        }

        .night-mode .navbar .menu a.twinview {
            color: #a89ac0;
        }

        .night-mode .navbar .menu a.twinview:hover {
            color: #b8aad0;
            background: rgba(138, 180, 176, 0.15);
        }

        .night-mode .navbar .menu a.twinview.active {
            background: rgba(138, 180, 176, 0.2);
            color: #b8aad0;
        }

        .night-mode .navbar .menu a.twinview i {
            color: #a89ac0;
        }

        .night-mode .night-mode-toggle {
            color: #9ab0b8;
        }

        .night-mode .night-mode-toggle:hover {
            background: #2f3e45;
            color: #8ab4b0;
        }

        .night-mode .navbar .account-links a {
            color: #8aa4ac;
        }

        .night-mode .navbar .account-links a:hover {
            color: #8ab4b0;
            background: rgba(138, 180, 176, 0.15);
        }

        .night-mode .navbar .account-links a.active {
            background: rgba(138, 180, 176, 0.2);
            color: #8ab4b0;
        }

        .night-mode .demo-content {
            background: #232e34;
            border-color: #2f3e45;
        }

        .night-mode .demo-content h2 {
            color: #d4dfe3;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .navbar { width: 70%; }
        }

        @media (max-width: 900px) {
            .navbar { width: 80%; padding: 0 16px; }
            .navbar .menu a { font-size: 0.7rem; padding: 4px 10px; }
            .navbar .menu a i { font-size: 0.75rem; width: 14px; }
            .navbar .account-links a { font-size: 0.7rem; padding: 4px 8px; }
        }

        @media (max-width: 768px) {
            .navbar { width: 95%; padding: 0 12px; height: 52px; }
            .navbar .menu { gap: 3px; }
            .navbar .menu a { font-size: 0.65rem; padding: 4px 8px; }
            .navbar .menu a i { font-size: 0.7rem; width: 12px; }
            .navbar .logo { font-size: 0.9rem; }
            .navbar .account-links a { font-size: 0.65rem; padding: 4px 6px; }
            .navbar .right { gap: 8px; }
            .night-mode-toggle { width: 28px; height: 28px; font-size: 0.75rem; }
        }

        @media (max-width: 600px) {
            .navbar .menu a span { display: none; }
            .navbar .menu a { padding: 4px 10px; }
            .navbar .menu a i { font-size: 0.9rem; width: auto; }
            .navbar .account-links a span { display: none; }
            .navbar .account-links a { padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="left">
            <div class="logo">spanSense</div>
            <div class="menu">
                <a href="#" class="active"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
                <a href="#"><i class="fas fa-calendar-alt"></i><span>Planning</span></a>
                <a href="#"><i class="fas fa-database"></i><span>Database</span></a>
                <a href="#"><i class="fas fa-map"></i><span>Map</span></a>
                <a href="#" class="twinview"><i class="fas fa-cube"></i><span>TwinView</span></a>
            </div>
        </div>
        <div class="right">
            <div class="night-mode-toggle" id="nightModeToggle"><i class="fas fa-moon"></i></div>
            <div class="account-links">
                <a href="#"><span>Account</span></a>
                <a href="#" class="active"><span>Contact Us</span></a>
            </div>
        </div>
    </nav>

    <!-- ===== DEMO CONTENT ===== -->
    <div class="demo-content">
        <h2>Navbar Mock — TwinView Added</h2>
        <p>
            <strong>Dashboard</strong> · <strong>Planning</strong> · <strong>Database</strong> · <strong>Map</strong> · <strong>TwinView</strong>
            <br><br>
            The navbar now includes <strong>TwinView</strong> with the <i class="fas fa-cube"></i> cube icon.
            All links are more compact for a cleaner fit.
            <br><br>
            <span style="font-size: 0.85rem; color: #8a9ba8;">
                Click the moon icon to toggle night mode.
            </span>
        </p>
    </div>

    <script>
        // ===== NIGHT MODE TOGGLE =====
        (function() {
            const toggleBtn = document.getElementById('nightModeToggle');
            if (!toggleBtn) return;

            toggleBtn.onclick = function(e) {
                e.preventDefault();
                document.body.classList.toggle('night-mode');
                this.innerHTML = document.body.classList.contains('night-mode') ?
                    '<i class="fas fa-sun"></i>' :
                    '<i class="fas fa-moon"></i>';
                localStorage.setItem('nightMode', document.body.classList.contains('night-mode') ? 'on' : 'off');
            };

            if (localStorage.getItem('nightMode') === 'on') {
                document.body.classList.add('night-mode');
                toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        })();
    </script>

</body>
</html>
